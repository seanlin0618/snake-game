<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐍 貪吃蛇</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a2e;
    color: #fff;
    font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    touch-action: none;
  }
  h1 {
    font-size: 1.8rem;
    margin-bottom: 6px;
    text-shadow: 0 0 20px rgba(0,255,136,0.5);
    letter-spacing: 4px;
  }
  .score-board {
    display: flex;
    gap: 20px;
    margin-bottom: 8px;
    font-size: 0.95rem;
    flex-wrap: wrap;
    justify-content: center;
  }
  .score-board div { display: flex; align-items: center; gap: 4px; }
  .score-board .label { color: #889; }
  .score-board .val { color: #0f8; font-weight: bold; font-size: 1.1rem; }
  .score-board .combo { color: #ff0; font-weight: bold; }
  .canvas-wrap {
    position: relative;
    line-height: 0;
  }
  canvas {
    border: 2px solid #0f8;
    border-radius: 8px;
    box-shadow: 0 0 30px rgba(0,255,136,0.3), inset 0 0 30px rgba(0,255,136,0.05);
    background: #0d0d35;
  }
  .hint {
    margin-top: 10px;
    font-size: 0.8rem;
    color: #556;
    letter-spacing: 1px;
  }
  .overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    background: rgba(10,10,46,0.85);
    border-radius: 8px;
    pointer-events: auto;
  }
  .overlay.hidden { display: none; }
  .overlay h2 { font-size: 1.8rem; text-shadow: 0 0 15px rgba(255,80,80,0.6); }
  .overlay .sub { font-size: 1.2rem; color: #ff8; }
  .overlay .stats { font-size: 0.9rem; color: #aaf; text-align: center; line-height: 1.6; }
  .overlay button {
    padding: 10px 32px;
    font-size: 1rem;
    border: 2px solid #0f8;
    background: transparent;
    color: #0f8;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 2px;
  }
  .overlay button:hover, .overlay button:active {
    background: #0f8;
    color: #0a0a2e;
    box-shadow: 0 0 20px rgba(0,255,136,0.5);
  }
  .diff-btns { display: flex; gap: 10px; }
  .diff-btns button {
    padding: 8px 18px;
    font-size: 0.85rem;
    border: 1px solid #556;
    background: transparent;
    color: #aab;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .diff-btns button.selected, .diff-btns button:hover {
    border-color: #0f8;
    color: #0f8;
    background: rgba(0,255,136,0.1);
  }

  /* Mobile controls */
  .mobile-controls {
    display: none;
    margin-top: 12px;
  }
  .mobile-controls button {
    width: 52px; height: 52px;
    font-size: 1.4rem;
    border: 1px solid #0f8;
    background: rgba(0,255,136,0.08);
    color: #0f8;
    border-radius: 8px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .mobile-controls button:active { background: rgba(0,255,136,0.35); }
  .d-pad { display: grid; grid-template-columns: 52px 52px 52px; grid-template-rows: 52px 52px; gap: 3px; }
  .d-pad .empty { visibility: hidden; }

  @media (pointer: coarse) {
    .mobile-controls { display: block; }
    .hint { display: none; }
  }
  @media (max-width: 440px) {
    canvas { width: 95vw; height: 95vw; }
    h1 { font-size: 1.4rem; }
    .score-board { font-size: 0.8rem; gap: 12px; }
  }
</style>
</head>
<body>

<h1>🐍 貪吃蛇</h1>
<div class="score-board">
  <div><span class="label">分數</span> <span class="val" id="score">0</span></div>
  <div><span class="label">最高</span> <span class="val" id="highScore">0</span></div>
  <div><span class="label">長度</span> <span class="val" id="length">3</span></div>
  <div id="comboWrap" style="display:none"><span class="label">連擊</span> <span class="combo" id="combo">x1</span></div>
</div>
<div class="canvas-wrap">
  <canvas id="game" width="400" height="400"></canvas>
  <div class="overlay" id="overlay">
    <h2 id="overlayTitle">🐍 貪吃蛇</h2>
    <div class="sub" id="overlayMsg"></div>
    <div class="stats" id="overlayStats"></div>
    <div class="diff-btns" id="diffBtns">
      <button data-diff="easy">簡單</button>
      <button data-diff="normal" class="selected">普通</button>
      <button data-diff="hard">困難</button>
    </div>
    <button id="startBtn">開始遊戲</button>
  </div>
</div>
<div class="hint">方向鍵 / WASD 移動 ｜ 空白鍵 暫停 ｜ G 加速衝刺</div>

<div class="mobile-controls">
  <div class="d-pad">
    <div class="empty"></div>
    <button id="btnUp">▲</button>
    <div class="empty"></div>
    <button id="btnLeft">◀</button>
    <button id="btnRight">▶</button>
    <button id="btnDown">▼</button>
  </div>
</div>

<script>
// ===== Audio Engine (Web Audio API) =====
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;
function ensureAudio() { if (!audioCtx) audioCtx = new AudioCtx(); }

function playTone(freq, dur, type = 'square', vol = 0.12) {
  ensureAudio();
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type;
  o.frequency.setValueAtTime(freq, audioCtx.currentTime);
  g.gain.setValueAtTime(vol, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  o.connect(g).connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + dur);
}

function sfxEat() { playTone(520, 0.08); setTimeout(() => playTone(780, 0.1), 60); }
function sfxBonus() { playTone(660, 0.06); setTimeout(() => playTone(880, 0.06), 50); setTimeout(() => playTone(1100, 0.12), 100); }
function sfxDie() { playTone(200, 0.3, 'sawtooth', 0.15); setTimeout(() => playTone(120, 0.4, 'sawtooth', 0.1), 150); }
function sfxTurn() { playTone(440, 0.03, 'sine', 0.05); }
function sfxCombo() { playTone(880, 0.05); playTone(1100, 0.08); }

// ===== Game Config =====
const DIFFICULTIES = {
  easy:   { startSpeed: 150, speedDecay: 1.5, minSpeed: 70,  label: '簡單' },
  normal: { startSpeed: 115, speedDecay: 2,   minSpeed: 50,  label: '普通' },
  hard:   { startSpeed: 80,  speedDecay: 2.5, minSpeed: 35,  label: '困難' },
};

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const highScoreEl = document.getElementById('highScore');
const lengthEl = document.getElementById('length');
const comboWrap = document.getElementById('comboWrap');
const comboEl = document.getElementById('combo');
const overlay = document.getElementById('overlay');
const overlayTitle = document.getElementById('overlayTitle');
const overlayMsg = document.getElementById('overlayMsg');
const overlayStats = document.getElementById('overlayStats');
const startBtn = document.getElementById('startBtn');
const diffBtns = document.getElementById('diffBtns');

const GRID = 20;
const COLS = canvas.width / GRID;
const ROWS = canvas.height / GRID;

let snake, dir, nextDir, food, specialFood, score, highScore, speed, gameLoop, paused, state;
let difficulty, particles, shakeFrames, combo, comboTimer, lastEatTime, totalEaten;
let trailCanvas, trailCtx;

highScore = +(localStorage.getItem('snakeHigh2') || 0);
highScoreEl.textContent = highScore;

// Difficulty buttons
let selectedDiff = 'normal';
diffBtns.addEventListener('click', e => {
  const btn = e.target.closest('[data-diff]');
  if (!btn) return;
  selectedDiff = btn.dataset.diff;
  diffBtns.querySelectorAll('button').forEach(b => b.classList.toggle('selected', b.dataset.diff === selectedDiff));
});

function init() {
  const mid = Math.floor(ROWS / 2);
  snake = [
    { x: Math.floor(COLS / 2), y: mid },
    { x: Math.floor(COLS / 2) - 1, y: mid },
    { x: Math.floor(COLS / 2) - 2, y: mid },
  ];
  dir = { x: 1, y: 0 };
  nextDir = { x: 1, y: 0 };
  score = 0;
  difficulty = DIFFICULTIES[selectedDiff];
  speed = difficulty.startSpeed;
  paused = false;
  particles = [];
  shakeFrames = 0;
  combo = 0;
  comboTimer = 0;
  lastEatTime = 0;
  totalEaten = 0;
  specialFood = null;
  scoreEl.textContent = '0';
  lengthEl.textContent = '3';
  comboWrap.style.display = 'none';

  // Init trail canvas
  trailCanvas = document.createElement('canvas');
  trailCanvas.width = canvas.width;
  trailCanvas.height = canvas.height;
  trailCtx = trailCanvas.getContext('2d');

  spawnFood();
}

function spawnFood() {
  let pos;
  do {
    pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
  } while (snake.some(s => s.x === pos.x && s.y === pos.y));
  food = { ...pos, type: 'normal', pulse: 0 };

  // Chance for special food
  if (score > 3 && Math.random() < 0.25 && !specialFood) {
    let sp;
    do {
      sp = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
    } while (snake.some(s => s.x === sp.x && s.y === sp.y) || (sp.x === pos.x && sp.y === pos.y));
    specialFood = { ...sp, type: 'bonus', pulse: 0, ttl: 120 }; // disappears after ~120 ticks
  }
}

// ===== Particles =====
function addParticles(x, y, color, count = 8) {
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 / count) * i + Math.random() * 0.5;
    const spd = 1.5 + Math.random() * 2.5;
    particles.push({
      x: x * GRID + GRID / 2,
      y: y * GRID + GRID / 2,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd,
      life: 1,
      decay: 0.02 + Math.random() * 0.03,
      size: 2 + Math.random() * 3,
      color,
    });
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.96;
    p.vy *= 0.96;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 6;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;
}

// ===== Draw =====
function draw() {
  // Shake
  ctx.save();
  if (shakeFrames > 0) {
    const sx = (Math.random() - 0.5) * shakeFrames * 1.5;
    const sy = (Math.random() - 0.5) * shakeFrames * 1.5;
    ctx.translate(sx, sy);
    shakeFrames *= 0.85;
    if (shakeFrames < 0.5) shakeFrames = 0;
  }

  // Background
  ctx.fillStyle = '#0d0d35';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Subtle grid
  for (let i = 0; i < COLS; i++) {
    for (let j = 0; j < ROWS; j++) {
      if ((i + j) % 2 === 0) {
        ctx.fillStyle = 'rgba(0,255,136,0.015)';
        ctx.fillRect(i * GRID, j * GRID, GRID, GRID);
      }
    }
  }

  // Trail (afterglow)
  if (state === 'playing') {
    trailCtx.fillStyle = 'rgba(13,13,53,0.3)';
    trailCtx.fillRect(0, 0, canvas.width, canvas.height);
    snake.forEach((seg, i) => {
      const alpha = 0.15 * (1 - i / snake.length);
      trailCtx.fillStyle = `rgba(0,255,136,${alpha})`;
      trailCtx.fillRect(seg.x * GRID + 3, seg.y * GRID + 3, GRID - 6, GRID - 6);
    });
    ctx.globalAlpha = 0.3;
    ctx.drawImage(trailCanvas, 0, 0);
    ctx.globalAlpha = 1;
  }

  // Food - normal
  const now = Date.now();
  food.pulse = (food.pulse || 0) + 0.08;
  const fp = Math.sin(food.pulse) * 0.15 + 0.85;
  ctx.shadowColor = '#ff4466';
  ctx.shadowBlur = 10 + Math.sin(food.pulse) * 4;
  ctx.fillStyle = '#ff4466';
  ctx.beginPath();
  ctx.arc(food.x * GRID + GRID / 2, food.y * GRID + GRID / 2, (GRID / 2 - 2) * fp, 0, Math.PI * 2);
  ctx.fill();
  // Inner glow
  ctx.fillStyle = '#ff8899';
  ctx.beginPath();
  ctx.arc(food.x * GRID + GRID / 2, food.y * GRID + GRID / 2, (GRID / 2 - 5) * fp, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Special food (golden star)
  if (specialFood) {
    specialFood.ttl--;
    if (specialFood.ttl <= 0) {
      specialFood = null;
    } else {
      specialFood.pulse = (specialFood.pulse || 0) + 0.12;
      const blink = specialFood.ttl < 30 ? (Math.floor(specialFood.ttl / 4) % 2 === 0) : true;
      if (blink) {
        const sp = Math.sin(specialFood.pulse) * 0.2 + 0.8;
        ctx.shadowColor = '#ffd700';
        ctx.shadowBlur = 14 + Math.sin(specialFood.pulse) * 6;
        // Star shape
        drawStar(specialFood.x * GRID + GRID / 2, specialFood.y * GRID + GRID / 2, 5, (GRID / 2 - 1) * sp, (GRID / 4) * sp);
        ctx.fillStyle = '#ffd700';
        ctx.fill();
        ctx.shadowBlur = 0;
      }
    }
  }

  // Snake body
  snake.forEach((seg, i) => {
    const ratio = 1 - i / snake.length;
    const g = Math.floor(160 + ratio * 95);
    const b = Math.floor(40 + ratio * 40);
    ctx.fillStyle = i === 0 ? `rgb(0, ${g}, 90)` : `rgb(0, ${g}, ${b})`;

    if (i === 0) {
      ctx.shadowColor = 'rgba(0,255,136,0.7)';
      ctx.shadowBlur = 10;
    } else if (i < 3) {
      ctx.shadowColor = 'rgba(0,255,136,0.3)';
      ctx.shadowBlur = 5;
    } else {
      ctx.shadowBlur = 0;
    }

    const pad = i === 0 ? 1 : 2;
    const r = i === 0 ? 5 : 4;
    const x = seg.x * GRID + pad;
    const y = seg.y * GRID + pad;
    const w = GRID - pad * 2;
    const h = GRID - pad * 2;
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
    ctx.fill();
  });
  ctx.shadowBlur = 0;

  // Eyes
  if (snake.length > 0) {
    const h = snake[0];
    const ex = h.x * GRID + GRID / 2;
    const ey = h.y * GRID + GRID / 2;
    const dx = dir.x * 3;
    const dy = dir.y * 3;
    // Eye whites
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(ex - 3.5 + dx, ey - 2 + dy, 2.5, 0, Math.PI * 2);
    ctx.arc(ex + 3.5 + dx, ey - 2 + dy, 2.5, 0, Math.PI * 2);
    ctx.fill();
    // Pupils
    ctx.fillStyle = '#111';
    ctx.beginPath();
    ctx.arc(ex - 3.5 + dx + dir.x, ey - 2 + dy + dir.y, 1.2, 0, Math.PI * 2);
    ctx.arc(ex + 3.5 + dx + dir.x, ey - 2 + dy + dir.y, 1.2, 0, Math.PI * 2);
    ctx.fill();
    // Tongue (occasionally)
    if (Math.floor(Date.now() / 400) % 4 === 0) {
      ctx.strokeStyle = '#f44';
      ctx.lineWidth = 1.5;
      const tx = ex + dir.x * 10;
      const ty = ey + dir.y * 10;
      ctx.beginPath();
      ctx.moveTo(ex + dir.x * 6, ey + dir.y * 6);
      ctx.lineTo(tx, ty);
      // Fork
      ctx.moveTo(tx, ty);
      ctx.lineTo(tx + dir.y * 2 - dir.x * 2, ty - dir.x * 2 - dir.y * 2);
      ctx.moveTo(tx, ty);
      ctx.lineTo(tx - dir.y * 2 - dir.x * 2, ty + dir.x * 2 - dir.y * 2);
      ctx.stroke();
    }
  }

  // Particles
  drawParticles();

  // Paused overlay
  if (paused) {
    ctx.fillStyle = 'rgba(10,10,46,0.6)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#0f8';
    ctx.font = 'bold 28px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('⏸  暫停', canvas.width / 2, canvas.height / 2);
    ctx.font = '14px sans-serif';
    ctx.fillStyle = '#668';
    ctx.fillText('按空白鍵繼續', canvas.width / 2, canvas.height / 2 + 30);
  }

  ctx.restore();
}

function drawStar(cx, cy, spikes, outerR, innerR) {
  ctx.beginPath();
  let rot = Math.PI / 2 * 3;
  const step = Math.PI / spikes;
  ctx.moveTo(cx, cy - outerR);
  for (let i = 0; i < spikes; i++) {
    ctx.lineTo(cx + Math.cos(rot) * outerR, cy + Math.sin(rot) * outerR);
    rot += step;
    ctx.lineTo(cx + Math.cos(rot) * innerR, cy + Math.sin(rot) * innerR);
    rot += step;
  }
  ctx.lineTo(cx, cy - outerR);
  ctx.closePath();
}

// ===== Game Logic =====
function step() {
  dir = { ...nextDir };
  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

  // Wall wrap
  if (head.x < 0) head.x = COLS - 1;
  else if (head.x >= COLS) head.x = 0;
  if (head.y < 0) head.y = ROWS - 1;
  else if (head.y >= ROWS) head.y = 0;

  // Self collision
  if (snake.some(s => s.x === head.x && s.y === head.y)) {
    die();
    return;
  }

  snake.unshift(head);

  // Normal food
  if (head.x === food.x && head.y === food.y) {
    eatFood(food, 1);
    spawnFood();
    clearInterval(gameLoop);
    gameLoop = setInterval(tick, speed);
  }
  // Special food
  else if (specialFood && head.x === specialFood.x && head.y === specialFood.y) {
    eatFood(specialFood, 3);
    specialFood = null;
    clearInterval(gameLoop);
    gameLoop = setInterval(tick, speed);
  }
  else {
    snake.pop();
  }

  // Update special food TTL
  if (specialFood) {
    specialFood.ttl--;
    if (specialFood.ttl <= 0) specialFood = null;
  }
}

function eatFood(f, multiplier) {
  const now = Date.now();
  totalEaten++;

  // Combo system: eat within 3 seconds = combo
  if (now - lastEatTime < 3000 && lastEatTime > 0) {
    combo++;
    comboTimer = 60;
    comboWrap.style.display = '';
    comboEl.textContent = `x${combo}`;
    if (combo >= 3) sfxCombo();
  } else {
    combo = 0;
    comboWrap.style.display = 'none';
  }
  lastEatTime = now;

  const points = (f.type === 'bonus' ? 5 : 1) * multiplier * (1 + combo);
  score += points;
  scoreEl.textContent = score;
  lengthEl.textContent = snake.length;
  if (f.type === 'bonus') sfxBonus(); else sfxEat();

  // Particles
  const color = f.type === 'bonus' ? '#ffd700' : '#ff4466';
  addParticles(f.x, f.y, color, f.type === 'bonus' ? 14 : 8);

  // Speed up
  if (speed > difficulty.minSpeed) {
    speed -= difficulty.speedDecay;
    clearInterval(gameLoop);
    gameLoop = setInterval(tick, speed);
  }
}

function tick() {
  if (!paused && state === 'playing') {
    step();
    updateParticles();
    if (comboTimer > 0) {
      comboTimer--;
      if (comboTimer <= 0) {
        combo = 0;
        comboWrap.style.display = 'none';
      }
    }
    draw();
  }
}

function die() {
  state = 'dead';
  clearInterval(gameLoop);
  sfxDie();
  shakeFrames = 12;

  // Death particles
  snake.forEach((seg, i) => {
    setTimeout(() => addParticles(seg.x, seg.y, '#0f8', 3), i * 20);
  });

  // Continue animating particles after death
  const deathAnim = () => {
    updateParticles();
    draw();
    if (particles.length > 0) requestAnimationFrame(deathAnim);
    else showGameOver();
  };
  requestAnimationFrame(deathAnim);
}

function showGameOver() {
  if (score > highScore) {
    highScore = score;
    localStorage.setItem('snakeHigh2', highScore);
    highScoreEl.textContent = highScore;
  }
  overlayTitle.textContent = '💀 遊戲結束';
  overlayMsg.textContent = `得分: ${score}`;
  overlayStats.innerHTML = `🐍 長度: ${snake.length}　🍎 吃掉: ${totalEaten}　⏱ 速度: ${Math.round(1000 / speed)}/秒${combo > 0 ? `<br>🔥 最高連擊: x${combo}` : ''}`;
  startBtn.textContent = '再來一局';
  diffBtns.style.display = 'none';
  overlay.classList.remove('hidden');
}

function start() {
  ensureAudio();
  init();
  overlay.classList.add('hidden');
  state = 'playing';
  draw();
  clearInterval(gameLoop);
  gameLoop = setInterval(tick, speed);
}

// ===== Controls =====
function setDir(x, y) {
  if (state !== 'playing') return;
  if (dir.x === -x && dir.y === -y) return;
  if (dir.x !== x || dir.y !== y) sfxTurn();
  nextDir = { x, y };
}

document.addEventListener('keydown', e => {
  const key = e.key.toLowerCase();
  const blocked = ['arrowup','arrowdown','arrowleft','arrowright','w','a','s','d','p',' '];
  if (blocked.includes(key)) e.preventDefault();
  if (key === 'arrowup' || key === 'w') setDir(0, -1);
  else if (key === 'arrowdown' || key === 's') setDir(0, 1);
  else if (key === 'arrowleft' || key === 'a') setDir(-1, 0);
  else if (key === 'arrowright' || key === 'd') setDir(1, 0);
  else if (key === 'p' || key === ' ') {
    if (state === 'playing') { paused = !paused; draw(); }
    else if (state === 'idle') start();
  }
  else if (key === 'enter' && state !== 'playing') start();
});

// Mobile buttons
['btnUp','btnDown','btnLeft','btnRight'].forEach(id => {
  const el = document.getElementById(id);
  const map = { btnUp: [0,-1], btnDown: [0,1], btnLeft: [-1,0], btnRight: [1,0] };
  el.addEventListener('touchstart', e => { e.preventDefault(); setDir(...map[id]); });
});

// Swipe
let touchStart = null;
canvas.addEventListener('touchstart', e => {
  touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY, t: Date.now() };
});
canvas.addEventListener('touchend', e => {
  if (!touchStart) return;
  const dx = e.changedTouches[0].clientX - touchStart.x;
  const dy = e.changedTouches[0].clientY - touchStart.y;
  const dt = Date.now() - touchStart.t;
  if (Math.abs(dx) < 10 && Math.abs(dy) < 10 && dt < 200) {
    // Tap = pause
    if (state === 'playing') { paused = !paused; draw(); }
  } else if (Math.abs(dx) > Math.abs(dy)) {
    setDir(dx > 0 ? 1 : -1, 0);
  } else {
    setDir(0, dy > 0 ? 1 : -1);
  }
  touchStart = null;
});

startBtn.addEventListener('click', start);

// Initial state
init();
draw();
overlayTitle.textContent = '🐍 貪吃蛇';
overlayMsg.textContent = '用方向鍵或 WASD 控制蛇頭';
overlayStats.innerHTML = '🍎 吃食物得分　⭐ 金色星星加分　🔥 連續吃觸發連擊';
startBtn.textContent = '開始遊戲';
diffBtns.style.display = '';
</script>
</body>
</html>
