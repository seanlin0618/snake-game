<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐍 貪吃蛇</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a2e;
    color: #fff;
    font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
  }
  h1 {
    font-size: 2rem;
    margin-bottom: 8px;
    text-shadow: 0 0 20px rgba(0,255,136,0.5);
    letter-spacing: 4px;
  }
  .score-board {
    display: flex;
    gap: 32px;
    margin-bottom: 12px;
    font-size: 1.1rem;
  }
  .score-board span { color: #0f8; font-weight: bold; }
  canvas {
    border: 2px solid #0f8;
    border-radius: 8px;
    box-shadow: 0 0 30px rgba(0,255,136,0.3), inset 0 0 30px rgba(0,255,136,0.05);
    background: #0d0d35;
  }
  .hint {
    margin-top: 14px;
    font-size: 0.85rem;
    color: #668;
    letter-spacing: 1px;
  }
  .overlay {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    pointer-events: auto;
  }
  .overlay h2 { font-size: 2rem; text-shadow: 0 0 15px rgba(255,80,80,0.6); }
  .overlay .final-score { font-size: 1.4rem; color: #ff8; }
  .overlay button {
    padding: 12px 36px;
    font-size: 1.1rem;
    border: 2px solid #0f8;
    background: transparent;
    color: #0f8;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 2px;
  }
  .overlay button:hover {
    background: #0f8;
    color: #0a0a2e;
    box-shadow: 0 0 20px rgba(0,255,136,0.5);
  }

  /* Mobile controls */
  .mobile-controls {
    display: none;
    margin-top: 16px;
    gap: 4px;
  }
  .mobile-controls button {
    width: 56px; height: 56px;
    font-size: 1.5rem;
    border: 1px solid #0f8;
    background: rgba(0,255,136,0.1);
    color: #0f8;
    border-radius: 8px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .mobile-controls button:active { background: rgba(0,255,136,0.35); }
  .d-pad { display: grid; grid-template-columns: 56px 56px 56px; grid-template-rows: 56px 56px; }
  .d-pad .empty { visibility: hidden; }

  @media (pointer: coarse) {
    .mobile-controls { display: block; }
    .hint { display: none; }
  }
</style>
</head>
<body>

<h1>🐍 貪吃蛇</h1>
<div class="score-board">
  <div>分數: <span id="score">0</span></div>
  <div>最高: <span id="highScore">0</span></div>
</div>
<canvas id="game" width="400" height="400"></canvas>
<div class="hint">方向鍵 / WASD 控制 ｜ P 暫停</div>

<div class="mobile-controls">
  <div class="d-pad">
    <div class="empty"></div>
    <button id="btnUp">▲</button>
    <div class="empty"></div>
    <button id="btnLeft">◀</button>
    <button id="btnRight">▶</button>
    <button id="btnDown">▼</button>
  </div>
</div>

<div class="overlay" id="overlay">
  <h2 id="overlayTitle">🐍 貪吃蛇</h2>
  <div class="final-score" id="overlayMsg"></div>
  <button id="startBtn">開始遊戲</button>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const highScoreEl = document.getElementById('highScore');
const overlay = document.getElementById('overlay');
const overlayTitle = document.getElementById('overlayTitle');
const overlayMsg = document.getElementById('overlayMsg');
const startBtn = document.getElementById('startBtn');

const GRID = 20;
const COLS = canvas.width / GRID;
const ROWS = canvas.height / GRID;

let snake, dir, nextDir, food, score, highScore, speed, gameLoop, paused, state;
// state: 'idle' | 'playing' | 'paused' | 'dead'

highScore = +(localStorage.getItem('snakeHigh') || 0);
highScoreEl.textContent = highScore;

function init() {
  const mid = Math.floor(ROWS / 2);
  snake = [
    { x: Math.floor(COLS / 2), y: mid },
    { x: Math.floor(COLS / 2) - 1, y: mid },
    { x: Math.floor(COLS / 2) - 2, y: mid },
  ];
  dir = { x: 1, y: 0 };
  nextDir = { x: 1, y: 0 };
  score = 0;
  speed = 120;
  paused = false;
  scoreEl.textContent = 0;
  spawnFood();
}

function spawnFood() {
  let pos;
  do {
    pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
  } while (snake.some(s => s.x === pos.x && s.y === pos.y));
  food = pos;
}

function draw() {
  // Background grid
  ctx.fillStyle = '#0d0d35';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.strokeStyle = 'rgba(0,255,136,0.04)';
  for (let i = 0; i < COLS; i++) {
    for (let j = 0; j < ROWS; j++) {
      if ((i + j) % 2 === 0) {
        ctx.fillStyle = 'rgba(0,255,136,0.02)';
        ctx.fillRect(i * GRID, j * GRID, GRID, GRID);
      }
    }
  }

  // Food with glow
  ctx.shadowColor = '#ff4444';
  ctx.shadowBlur = 12;
  ctx.fillStyle = '#ff4466';
  ctx.beginPath();
  ctx.arc(food.x * GRID + GRID / 2, food.y * GRID + GRID / 2, GRID / 2 - 2, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Snake
  snake.forEach((seg, i) => {
    const ratio = 1 - i / snake.length;
    const g = Math.floor(180 + ratio * 75);
    ctx.fillStyle = i === 0
      ? `rgb(0, ${g}, 80)`
      : `rgb(0, ${g}, 60)`;
    ctx.shadowColor = i === 0 ? 'rgba(0,255,136,0.6)' : 'transparent';
    ctx.shadowBlur = i === 0 ? 8 : 0;

    const pad = i === 0 ? 1 : 2;
    const r = 4;
    const x = seg.x * GRID + pad;
    const y = seg.y * GRID + pad;
    const w = GRID - pad * 2;
    const h = GRID - pad * 2;
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
    ctx.fill();
  });
  ctx.shadowBlur = 0;

  // Eyes on head
  if (snake.length > 0) {
    const h = snake[0];
    const ex = h.x * GRID + GRID / 2;
    const ey = h.y * GRID + GRID / 2;
    const dx = dir.x * 3;
    const dy = dir.y * 3;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(ex - 3 + dx, ey - 3 + dy, 2.2, 0, Math.PI * 2);
    ctx.arc(ex + 3 + dx, ey - 3 + dy, 2.2, 0, Math.PI * 2);
    ctx.fill();
  }

  if (paused) {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#0f8';
    ctx.font = 'bold 32px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('⏸ 暫停', canvas.width / 2, canvas.height / 2);
  }
}

function step() {
  dir = { ...nextDir };
  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

  // Wall wrap
  if (head.x < 0) head.x = COLS - 1;
  else if (head.x >= COLS) head.x = 0;
  if (head.y < 0) head.y = ROWS - 1;
  else if (head.y >= ROWS) head.y = 0;

  // Self collision
  if (snake.some(s => s.x === head.x && s.y === head.y)) {
    die();
    return;
  }

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    score++;
    scoreEl.textContent = score;
    if (speed > 50) speed -= 2;
    spawnFood();
    clearInterval(gameLoop);
    gameLoop = setInterval(tick, speed);
  } else {
    snake.pop();
  }
}

function tick() {
  if (!paused && state === 'playing') {
    step();
    draw();
  }
}

function die() {
  state = 'dead';
  clearInterval(gameLoop);
  if (score > highScore) {
    highScore = score;
    localStorage.setItem('snakeHigh', highScore);
    highScoreEl.textContent = highScore;
  }
  overlayTitle.textContent = '💀 遊戲結束';
  overlayMsg.textContent = `得分: ${score}`;
  startBtn.textContent = '再來一局';
  overlay.style.display = 'flex';
}

function start() {
  init();
  overlay.style.display = 'none';
  state = 'playing';
  draw();
  clearInterval(gameLoop);
  gameLoop = setInterval(tick, speed);
}

// Controls
function setDir(x, y) {
  if (state !== 'playing') return;
  if (dir.x === -x && dir.y === -y) return; // no reverse
  nextDir = { x, y };
}

document.addEventListener('keydown', e => {
  const key = e.key.toLowerCase();
  if (['arrowup','arrowdown','arrowleft','arrowright','w','a','s','d','p',' '].includes(key)) e.preventDefault();
  if (key === 'arrowup' || key === 'w') setDir(0, -1);
  else if (key === 'arrowdown' || key === 's') setDir(0, 1);
  else if (key === 'arrowleft' || key === 'a') setDir(-1, 0);
  else if (key === 'arrowright' || key === 'd') setDir(1, 0);
  else if (key === 'p' || key === ' ') {
    if (state === 'playing') {
      paused = !paused;
      draw();
    }
  }
});

// Mobile buttons
document.getElementById('btnUp').addEventListener('touchstart', e => { e.preventDefault(); setDir(0, -1); });
document.getElementById('btnDown').addEventListener('touchstart', e => { e.preventDefault(); setDir(0, 1); });
document.getElementById('btnLeft').addEventListener('touchstart', e => { e.preventDefault(); setDir(-1, 0); });
document.getElementById('btnRight').addEventListener('touchstart', e => { e.preventDefault(); setDir(1, 0); });

// Swipe support
let touchStart = null;
canvas.addEventListener('touchstart', e => {
  touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
});
canvas.addEventListener('touchend', e => {
  if (!touchStart) return;
  const dx = e.changedTouches[0].clientX - touchStart.x;
  const dy = e.changedTouches[0].clientY - touchStart.y;
  if (Math.abs(dx) > Math.abs(dy)) {
    setDir(dx > 0 ? 1 : -1, 0);
  } else {
    setDir(0, dy > 0 ? 1 : -1);
  }
  touchStart = null;
});

startBtn.addEventListener('click', start);

// Initial draw
init();
draw();
overlay.style.display = 'flex';
overlayTitle.textContent = '🐍 貪吃蛇';
overlayMsg.textContent = '用方向鍵或 WASD 控制蛇頭';
startBtn.textContent = '開始遊戲';
</script>
</body>
</html>
